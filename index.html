<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trogerism Exhibition</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { letter-spacing: 5px; }
        .exhibition-container { column-count: 3; column-gap: 15px; margin-top: 30px; }
        .gallery-item { margin-bottom: 15px; break-inside: avoid; border: 1px solid #333; }
        .gallery-item img { width: 100%; height: auto; display: block; }
        
        /* Digital Vault Store Styling */
        .vault-section { margin-top: 50px; padding: 20px; border-top: 1px solid #333; }
        .buy-btn { background: #fff; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; display: inline-block; margin: 10px; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .exhibition-container { column-count: 1; }
            .gallery-item img {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
            }
        }
    </style>
</head>
<body>

    <h1>TROGERISM EXHIBITION</h1>

    <div class="exhibition-container" id="gallery">
        <script>
            const totalExhibitionImages = 36;
            const gallery = document.getElementById('gallery');
            // Counting down so newest is at the top
            for (let i = totalExhibitionImages; i >= 1; i--) {
                gallery.innerHTML += `<div class="gallery-item"><img src="images/img (${i}).jpg" alt="Photography"></div>`;
            }
        </script>
    </div>

    <!-- Digital Vault Store -->
    <div class="vault-section">
        <h2>DIGITAL VAULT</h2>
        <p>Purchase high-resolution assets.</p>
        <!-- Add your PayPal / Store buttons here -->
        <a href="#" class="buy-btn">Purchase Access</a>
    </div>

</body>
</html>
