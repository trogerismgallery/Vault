<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TROGERISM | Photography Exhibition</title>
    <style>
        /* Matches your exact site styling and aesthetic */
        body { background-color: #050505; color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        header { background: rgba(17, 17, 17, 0.95); padding: 70px 20px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        h1 { color: #fff; letter-spacing: 14px; text-transform: uppercase; margin: 0; font-size: 2.4rem; font-weight: 200; }
        .subtitle-banner { color: #888; letter-spacing: 4px; font-size: 0.75rem; margin-top: 15px; text-transform: uppercase; opacity: 0.8; }
        
        /* Premium multi-column masonry style gallery */
        .exhibition-container { max-width: 1400px; margin: 40px auto; padding: 20px; column-count: 3; column-gap: 30px; }
        .gallery-item { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 30px; break-inside: avoid; display: inline-block; width: 100%; box-sizing: border-box; }
        .exhibition-label { color: #555; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; display: block; }
        
        /* Secure Image Display with Watermark */
        .image-container { position: relative; width: 100%; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .image-container img { width: 100%; height: auto; display: block; object-fit: contain; }
        .image-container::after { content: "TROGERISM"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); color: rgba(255, 255, 255, 0.08); font-size: 2rem; letter-spacing: 10px; font-weight: bold; pointer-events: none; border: 2px solid rgba(255, 255, 255, 0.05); padding: 10px 20px; white-space: nowrap; }
        
        /* Navigation back to your main store */
        .nav-section { padding: 40px 20px; border-top: 1px solid #111; background: #050505; }
        .nav-link { display: inline-block; padding: 15px 35px; border: 1px solid #333; color: #888; text-decoration: none; font-size: 0.7rem; letter-spacing: 3px; transition: 0.3s; text-transform: uppercase; margin-bottom: 20px; }
        .nav-link:hover { border-color: #fff; color: #fff; background: transparent; }
        
        .contact-section { padding: 40px 20px; background: #050505; border-top: 1px solid #111; }
        .contact-link { color: #666; text-decoration: none; border-bottom: 1px solid #222; padding-bottom: 5px; margin: 0 20px; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; transition: 0.3s; }
        .contact-link:hover { color: #fff; border-bottom-color: #fff; }
        .copyright-text { color: #444; font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; padding: 40px 0 60px 0; border-top: 1px solid #111; }
        
        /* Smooth adjustments for tablet and mobile screens */
        @media (max-width: 900px) { .exhibition-container { column-count: 2; gap: 20px; } }
        @media (max-width: 600px) { .exhibition-container { column-count: 1; padding: 10px; } .gallery-item { margin-bottom: 20px; } h1 { font-size: 1.8rem; letter-spacing: 8px; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>TROGERISM</h1>
        <div class="subtitle-banner">Visual Exhibition • 36 Frame Sequence</div>
    </header>

    <div class="exhibition-container" id="exhibition-grid"></div>

    <div class="nav-section">
        <a href="index.html" class="nav-link">Return To Digital Vault Store</a>
    </div>

    <div class="contact-section">
        <a href="https://www.instagram.com/Tomrogers1981" target="_blank" class="contact-link">Instagram</a>
        <a href="mailto:Trogerismphotography@yahoo.com" class="contact-link">Inquiries</a>
    </div>

    <div class="copyright-text">© Copyright 2026 Trogerismphotography</div>

    <script>
        const gridContainer = document.getElementById('exhibition-grid');
        const totalExhibitionImages = 36;

        // Loop dynamically builds your 36 cards perfectly in order
        for (let i = 1; i <= totalExhibitionImages; i++) {
            const card = document.createElement('div');
            card.className = 'gallery-item';
            
            // Numbers formatted nicely like your store's vault labels
            const displayNum = i < 10 ? '0' + i : i;
            
            card.innerHTML = `
                <span class="exhibition-label">Exhibition Frame ${displayNum}</span>
                <div class="image-container">
                    <img src="images/img (${i}).jpg" alt="Trogerism Exhibition Frame ${displayNum}" loading="lazy">
                </div>
            `;
            
            gridContainer.appendChild(card);
        }
    </script>
